name: 缺陷反馈（Bug）
description: 报告问题以帮助我们改进 Halo-CTL
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 现象描述
      description: 发生了什么？期望是什么？
      placeholder: 例如：publish-json 一直轮询 404
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请给出可复现的最小步骤。
      placeholder: |
        1) 设置 HALO_BASE_URL/HALO_PAT
        2) 运行 xxx
        3) 观察输出
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志/输出
      description: 请粘贴关键日志（注意去除 PAT 等敏感信息）。
      render: shell

  - type: input
    id: version
    attributes:
      label: Halo-CTL 版本
      placeholder: 2.0.0

  - type: input
    id: halo
    attributes:
      label: Halo 版本
      placeholder: 2.23.0

  - type: dropdown
    id: deploy
    attributes:
      label: 部署方式
      options:
        - 直接 Python 运行
        - Docker / Docker Compose
        - 1Panel
    validations:
      required: true

